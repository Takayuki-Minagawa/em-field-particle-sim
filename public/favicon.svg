<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>
  <!-- Magnetic field ring (outer) -->
  <ellipse cx="32" cy="32" rx="22" ry="10" fill="none" stroke="#38bdf8" stroke-width="1.8" opacity="0.6" transform="rotate(-30 32 32)"/>
  <!-- Magnetic field ring (inner) -->
  <ellipse cx="32" cy="32" rx="16" ry="7" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" transform="rotate(30 32 32)"/>
  <!-- Electric field lines -->
  <line x1="32" y1="8" x2="32" y2="20" stroke="#facc15" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="44" x2="32" y2="56" stroke="#facc15" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="32" x2="20" y2="32" stroke="#facc15" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="32" x2="56" y2="32" stroke="#facc15" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Diagonal field lines -->
  <line x1="13" y1="13" x2="21" y2="21" stroke="#facc15" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="43" y1="43" x2="51" y2="51" stroke="#facc15" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="51" y1="13" x2="43" y2="21" stroke="#facc15" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="21" y1="43" x2="13" y2="51" stroke="#facc15" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Charged particle (center) -->
  <circle cx="32" cy="32" r="8" fill="#ef4444"/>
  <circle cx="32" cy="32" r="8" fill="url(#glow)"/>
  <!-- Particle glow -->
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <!-- Plus sign on particle -->
  <line x1="29" y1="32" x2="35" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="29" x2="32" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Spiral trajectory hint -->
  <path d="M 40 24 Q 46 28 44 35 Q 42 42 36 40" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <polygon points="35,41 37,39 34,38" fill="#a78bfa" opacity="0.7"/>
</svg>
